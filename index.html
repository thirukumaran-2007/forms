<html>
    <head>
        <title>FORM</title>
    </head>
    <body style="background-color: rgb(219, 183, 252);">
        <center>
            <h1>FORM</h1>
        <form>
           <h2> 
            <label">NAME:</label>
            <input type="text" name="name" placeholder="Enter your Name" pattern = "[A-Za-z\s]+" title="Enter only characters" required>
            <br>
        </h2>
           <h2>
            <label>AGE:</label>
            <input type="number" name="age" placeholder="Enter your Age">
            <br>
            </h2>
            <h2>
                <label>DOB:</label>
                <input type="date" name="date" placeholder="dd/mm/yyyy">
                <br>
            </h2>
            <label>COURSE:</label>
            <select name="course">
                <option>select</option>
                <option>B.Sc</option>
                <option>B.Com</option>
                <option>BBA</option>
            </select>
       
            <br>
            <h3>
                <label>SKILLS:</label>
            <input type="checkbox" name="skills">python
            <input type="checkbox" name="skills">c
            <input type="checkbox" name="skills">java
            <input type="checkbox" name="skills">c++<br>
            </h3>
            <h3>
                <label>GENDER:</label>
            <input type="radio" name="gender">Male
            <input type="radio" name="gender">Female<br>
            </h3>
        
                <input type="submit" value="register">
    
            

        </form>
        </center>
    </body>
</html>
